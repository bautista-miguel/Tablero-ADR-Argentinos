name: Smart Alpha Vantage update

on:
  workflow_dispatch:
  schedule:
    # Monday-Friday at 11:20 UTC.
    - cron: "20 11 * * 1-5"

permissions:
  contents: write

concurrency:
  group: smart-alpha-vantage-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas requests

      - name: Run smart update
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: python update_fundamentals.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fundamentals_cache.csv update_metadata.json
          git diff --cached --quiet || git commit -m "Smart Alpha Vantage data update"
          git push
